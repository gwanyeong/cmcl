# site properties and page defaults
title: Computational Materials Chemistry Laboratory
subtitle: 
description: The Computational Materials Chemistry Laboratory (CMCL) at Incheon National University focuses on the rational design of advanced materials for energy and environmental applications. We address key challenges in energy materials, catalysis, optoelectronics, and quantum materials through AI-augmented multi-scale modeling and simulation.
header: images/background.jpg
footer: images/background.jpg
proofer: false

