# site properties and page defaults
title: Computational Materials Chemistry Laboratory
subtitle: Solving the puzzle of atoms to unveil the hidden logic of materials
description: Solving the puzzle of atoms to unveil the hidden logic of materials
header: images/INU_background_2.jpg
footer: images/INU_background_2.jpg
proofer: false
show-subtitle: true

